services:
  backend:
    image: ${DOCKER_REGISTRY}/${DOCKER_IMAGE_PREFIX}-backend:${DOCKER_IMAGE_TAG}
    build:
      context: ./backend
    container_name: inkmind-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - inkmind-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    image: ${DOCKER_REGISTRY}/${DOCKER_IMAGE_PREFIX}-frontend:${DOCKER_IMAGE_TAG}
    build:
      context: ./frontend
    container_name: inkmind-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  inkmind-data:
