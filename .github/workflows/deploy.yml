name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY || 'ghcr.io' }}
  IMAGE_PREFIX: ${{ secrets.DOCKER_IMAGE_PREFIX || format('{0}/inkmind', github.repository_owner) }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        run: |
          TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read config files
        id: configs
        run: |
          DOCKER_COMPOSE=$(cat docker-compose.yml | base64 -w0)
          ENV_TEMPLATE=$(cat deploy/env.production.template | base64 -w0)
          echo "docker_compose=$DOCKER_COMPOSE" >> $GITHUB_OUTPUT
          echo "env_template=$ENV_TEMPLATE" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e

            DEPLOY_PATH="/opt/inkmind"
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            REGISTRY="${{ env.REGISTRY }}"
            IMAGE_PREFIX="${{ env.IMAGE_PREFIX }}"
            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH

            # 写入 docker-compose.yml（从 CI 仓库解码）
            echo "${{ steps.configs.outputs.docker_compose }}" | base64 -d > docker-compose.yml

            # 写入 env 模板并以此为 .env 基础
            echo "${{ steps.configs.outputs.env_template }}" | base64 -d > env.template
            cp env.template .env

            # 覆盖 Docker Compose 镜像变量
            sed -i "s|^DOCKER_REGISTRY=.*|DOCKER_REGISTRY=$REGISTRY|" .env
            sed -i "s|^DOCKER_IMAGE_PREFIX=.*|DOCKER_IMAGE_PREFIX=$IMAGE_PREFIX|" .env
            sed -i "s|^DOCKER_IMAGE_TAG=.*|DOCKER_IMAGE_TAG=$IMAGE_TAG|" .env

            # 覆盖敏感配置（从 GitHub Secrets 写入，跳过未设置的）
            [ -n "${{ secrets.SECRET_KEY }}" ] && sed -i "s|^SECRET_KEY=.*|SECRET_KEY=${{ secrets.SECRET_KEY }}|" .env
            [ -n "${{ secrets.DATABASE_URL }}" ] && sed -i "s|^DATABASE_URL=.*|DATABASE_URL=${{ secrets.DATABASE_URL }}|" .env
            [ -n "${{ secrets.CORS_ORIGINS }}" ] && sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}|" .env
            [ -n "${{ secrets.DEFAULT_LLM_PROVIDER }}" ] && sed -i "s|^DEFAULT_LLM_PROVIDER=.*|DEFAULT_LLM_PROVIDER=${{ secrets.DEFAULT_LLM_PROVIDER }}|" .env
            [ -n "${{ secrets.QWEN_API_KEY }}" ] && sed -i "s|^QWEN_API_KEY=.*|QWEN_API_KEY=${{ secrets.QWEN_API_KEY }}|" .env
            [ -n "${{ secrets.DEEPSEEK_API_KEY }}" ] && sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}|" .env
            [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ] && sed -i "s|^ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}|" .env
            [ -n "${{ secrets.OPENAI_API_KEY }}" ] && sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}|" .env
            [ -n "${{ secrets.MINIMAX_API_KEY }}" ] && sed -i "s|^MINIMAX_API_KEY=.*|MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}|" .env
            [ -n "${{ secrets.MOONSHOT_API_KEY }}" ] && sed -i "s|^MOONSHOT_API_KEY=.*|MOONSHOT_API_KEY=${{ secrets.MOONSHOT_API_KEY }}|" .env
            [ -n "${{ secrets.AGENT_PERMISSION_MODE }}" ] && sed -i "s|^AGENT_PERMISSION_MODE=.*|AGENT_PERMISSION_MODE=${{ secrets.AGENT_PERMISSION_MODE }}|" .env
            [ -n "${{ secrets.AGENT_MAX_TURNS }}" ] && sed -i "s|^AGENT_MAX_TURNS=.*|AGENT_MAX_TURNS=${{ secrets.AGENT_MAX_TURNS }}|" .env

            # 登录镜像仓库
            docker login $REGISTRY -u "${{ secrets.DOCKER_USERNAME || github.actor }}" -p "${{ secrets.DOCKER_PASSWORD || secrets.GITHUB_TOKEN }}"

            # 拉取最新镜像
            docker compose pull

            # 滚动更新容器
            docker compose up -d --remove-orphans

            # 清理旧镜像
            docker image prune -f

            # 健康检查
            echo -n "等待服务启动"
            for i in $(seq 1 20); do
              if curl -sf http://127.0.0.1/health >/dev/null 2>&1; then
                echo " OK"
                echo "部署成功！镜像版本: $IMAGE_TAG"
                exit 0
              fi
              echo -n "."
              sleep 3
            done
            echo ""
            echo "健康检查失败，查看日志："
            docker compose logs --tail=50
            exit 1
