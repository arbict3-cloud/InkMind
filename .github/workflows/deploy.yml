name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read config files
        id: configs
        run: |
          {
            echo 'docker_compose<<EOF'
            cat docker-compose.yml
            echo EOF
          } >> $GITHUB_OUTPUT
          {
            echo 'env_template<<EOF'
            cat deploy/env.production.template
            echo EOF
          } >> $GITHUB_OUTPUT
          {
            echo 'backend_dockerfile<<EOF'
            cat backend/Dockerfile
            echo EOF
          } >> $GITHUB_OUTPUT
          {
            echo 'frontend_dockerfile<<EOF'
            cat frontend/Dockerfile
            echo EOF
          } >> $GITHUB_OUTPUT
          {
            echo 'nginx_conf<<EOF'
            cat frontend/nginx.conf
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          port: "22"
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            DEPLOY_PATH="/opt/inkmind"
            mkdir -p $DEPLOY_PATH/{backend,frontend}
            cd $DEPLOY_PATH

            # 写入配置文件
            cat > docker-compose.yml << 'FILEEOF'
            ${{ steps.configs.outputs.docker_compose }}
            FILEEOF
            cat > backend/Dockerfile << 'FILEEOF'
            ${{ steps.configs.outputs.backend_dockerfile }}
            FILEEOF
            cat > frontend/Dockerfile << 'FILEEOF'
            ${{ steps.configs.outputs.frontend_dockerfile }}
            FILEEOF
            cat > frontend/nginx.conf << 'FILEEOF'
            ${{ steps.configs.outputs.nginx_conf }}
            FILEEOF
            cat > env.template << 'FILEEOF'
            ${{ steps.configs.outputs.env_template }}
            FILEEOF

            # 生成 .env
            cp env.template .env

            # 覆盖敏感配置（从 GitHub Secrets 写入，跳过未设置的）
            [ -n "${{ secrets.SECRET_KEY }}" ] && sed -i "s|^SECRET_KEY=.*|SECRET_KEY=${{ secrets.SECRET_KEY }}|" .env
            [ -n "${{ secrets.DATABASE_URL }}" ] && sed -i "s|^DATABASE_URL=.*|DATABASE_URL=${{ secrets.DATABASE_URL }}|" .env
            [ -n "${{ secrets.CORS_ORIGINS }}" ] && sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}|" .env
            [ -n "${{ secrets.DEFAULT_LLM_PROVIDER }}" ] && sed -i "s|^DEFAULT_LLM_PROVIDER=.*|DEFAULT_LLM_PROVIDER=${{ secrets.DEFAULT_LLM_PROVIDER }}|" .env
            [ -n "${{ secrets.QWEN_API_KEY }}" ] && sed -i "s|^QWEN_API_KEY=.*|QWEN_API_KEY=${{ secrets.QWEN_API_KEY }}|" .env
            [ -n "${{ secrets.DEEPSEEK_API_KEY }}" ] && sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}|" .env
            [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ] && sed -i "s|^ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}|" .env
            [ -n "${{ secrets.OPENAI_API_KEY }}" ] && sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}|" .env
            [ -n "${{ secrets.MINIMAX_API_KEY }}" ] && sed -i "s|^MINIMAX_API_KEY=.*|MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}|" .env
            [ -n "${{ secrets.MOONSHOT_API_KEY }}" ] && sed -i "s|^MOONSHOT_API_KEY=.*|MOONSHOT_API_KEY=${{ secrets.MOONSHOT_API_KEY }}|" .env
            [ -n "${{ secrets.AGENT_PERMISSION_MODE }}" ] && sed -i "s|^AGENT_PERMISSION_MODE=.*|AGENT_PERMISSION_MODE=${{ secrets.AGENT_PERMISSION_MODE }}|" .env
            [ -n "${{ secrets.AGENT_MAX_TURNS }}" ] && sed -i "s|^AGENT_MAX_TURNS=.*|AGENT_MAX_TURNS=${{ secrets.AGENT_MAX_TURNS }}|" .env

            # 本地构建并启动（避免从 ghcr.io 拉镜像的超时问题）
            docker compose build --no-cache
            docker compose up -d --remove-orphans

            # 清理旧镜像
            docker image prune -f

            # 健康检查
            echo -n "等待服务启动"
            for i in $(seq 1 20); do
              if curl -sf http://127.0.0.1/health >/dev/null 2>&1; then
                echo " OK"
                echo "部署成功！"
                exit 0
              fi
              echo -n "."
              sleep 3
            done
            echo ""
            echo "健康检查失败，查看日志："
            docker compose logs --tail=50
            exit 1
