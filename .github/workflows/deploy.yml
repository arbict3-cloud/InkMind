name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      DOCKER_REGISTRY: ${{ secrets.ACR_REGISTRY }}
      DOCKER_IMAGE_PREFIX: ${{ secrets.ACR_NAMESPACE }}/inkmind
      DOCKER_IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-backend:${{ env.DOCKER_IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-frontend:${{ env.DOCKER_IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          port: "22"
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 10m
          script: |
            DEPLOY_PATH="/opt/inkmind"
            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH

            echo "=== [1/5] 拉取代码 ==="
            if [ ! -d ".git" ]; then
              rm -rf ${DEPLOY_PATH:?}/*
              git config --global http.postBuffer 524288000
              git config --global http.lowSpeedLimit 1000
              git config --global http.lowSpeedTime 60
              git clone --depth 1 https://github.com/${{ github.repository }}.git . || { echo "ERROR: git clone failed"; exit 1; }
            fi
            git config --global http.postBuffer 524288000
            git fetch --depth 1 origin main || { echo "ERROR: git fetch failed"; exit 1; }
            git reset --hard origin/main || { echo "ERROR: git reset failed"; exit 1; }
            echo "代码版本: $(git log --oneline -1)"

            echo "=== [2/5] 写入 .env ==="
            cp deploy/env.production.template .env || { echo "ERROR: cp env template failed"; exit 1; }

            sed -i "s|^DOCKER_REGISTRY=.*|DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}|" .env
            sed -i "s|^DOCKER_IMAGE_PREFIX=.*|DOCKER_IMAGE_PREFIX=${{ env.DOCKER_IMAGE_PREFIX }}|" .env
            sed -i "s|^DOCKER_IMAGE_TAG=.*|DOCKER_IMAGE_TAG=${{ env.DOCKER_IMAGE_TAG }}|" .env
            [ -n "${{ secrets.SECRET_KEY }}" ] && sed -i "s|^SECRET_KEY=.*|SECRET_KEY=${{ secrets.SECRET_KEY }}|" .env
            [ -n "${{ secrets.DATABASE_URL }}" ] && sed -i "s|^DATABASE_URL=.*|DATABASE_URL=${{ secrets.DATABASE_URL }}|" .env
            [ -n "${{ secrets.CORS_ORIGINS }}" ] && sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}|" .env
            [ -n "${{ secrets.DEFAULT_LLM_PROVIDER }}" ] && sed -i "s|^DEFAULT_LLM_PROVIDER=.*|DEFAULT_LLM_PROVIDER=${{ secrets.DEFAULT_LLM_PROVIDER }}|" .env
            [ -n "${{ secrets.QWEN_API_KEY }}" ] && sed -i "s|^QWEN_API_KEY=.*|QWEN_API_KEY=${{ secrets.QWEN_API_KEY }}|" .env
            [ -n "${{ secrets.DEEPSEEK_API_KEY }}" ] && sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}|" .env
            [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ] && sed -i "s|^ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}|" .env
            [ -n "${{ secrets.OPENAI_API_KEY }}" ] && sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}|" .env
            [ -n "${{ secrets.MINIMAX_API_KEY }}" ] && sed -i "s|^MINIMAX_API_KEY=.*|MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}|" .env
            [ -n "${{ secrets.MOONSHOT_API_KEY }}" ] && sed -i "s|^MOONSHOT_API_KEY=.*|MOONSHOT_API_KEY=${{ secrets.MOONSHOT_API_KEY }}|" .env
            [ -n "${{ secrets.AGENT_PERMISSION_MODE }}" ] && sed -i "s|^AGENT_PERMISSION_MODE=.*|AGENT_PERMISSION_MODE=${{ secrets.AGENT_PERMISSION_MODE }}|" .env
            [ -n "${{ secrets.AGENT_MAX_TURNS }}" ] && sed -i "s|^AGENT_MAX_TURNS=.*|AGENT_MAX_TURNS=${{ secrets.AGENT_MAX_TURNS }}|" .env
            echo ".env 已写入"

            echo "=== [3/5] 拉取镜像 ==="
            printf '%s' "${{ secrets.ACR_PASSWORD }}" | docker login "${{ env.DOCKER_REGISTRY }}" -u "${{ secrets.ACR_USERNAME }}" --password-stdin || { echo "ERROR: docker login failed"; exit 1; }
            docker compose pull || { echo "ERROR: docker compose pull failed"; exit 1; }

            echo "=== [4/5] 启动服务 ==="
            docker compose up -d --remove-orphans --no-build || {
              echo "ERROR: docker compose up failed，查看后端日志："
              docker compose logs backend --tail=100 2>/dev/null || true
              exit 1
            }
            docker image prune -f

            echo "=== [5/5] 健康检查 ==="
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1/health >/dev/null 2>&1; then
                echo "部署成功！"
                exit 0
              fi
              echo -n "."
              sleep 3
            done
            echo ""
            echo "健康检查失败，查看日志："
            docker compose logs backend --tail=100 2>/dev/null || true
            docker compose logs frontend --tail=50 2>/dev/null || true
            exit 1
